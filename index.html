<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Sistema Escolar 00622</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="login-box">

    <!-- LOGO -->
    <div class="logo">
        <img src="img/logo.png" alt="logo">
        <h3>I.E 00622 El Porvenir</h3>
        <p>Rioja</p>
    </div>

    <h2>Iniciar Sesión</h2>

    <form onsubmit="login(); return false;">
        
        <input 
            type="email" 
            id="email" 
            placeholder="Correo electrónico" 
            required 
            autofocus
        >

        <input 
            type="password" 
            id="password" 
            placeholder="Contraseña" 
            required
        >

        <button type="submit">Ingresar</button>
    </form>

    <p style="margin-top:10px;">
        ¿No tienes cuenta? 
        <a href="register.html" style="color:#38bdf8;">Regístrate</a>
    </p>

</div>

<!-- SCRIPTS -->
<script src="js/db.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
